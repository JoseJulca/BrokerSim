<svg viewBox="0 0 1150 700" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1150" height="700" fill="#ffffff"/>

  <!-- Título -->
  <text x="575" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">
    BrokerSim — Arquitectura Cliente-Servidor (demo: sistema de pedidos)
  </text>
  <text x="575" y="54" text-anchor="middle" font-size="12" fill="#666">
    Cliente-Servidor sobre WebSocket propio · Pub/Sub genérico por tópicos · sin RabbitMQ/Kafka/ActiveMQ
  </text>

  <!-- ===================== SERVIDOR BROKER ===================== -->
  <rect x="420" y="210" width="310" height="260" rx="10" fill="#eef3fb" stroke="#2b5fa8" stroke-width="2"/>
  <text x="575" y="236" text-anchor="middle" font-size="15" font-weight="700" fill="#1a3c6e">Servidor Broker (ASP.NET Core)</text>
  <text x="575" y="253" text-anchor="middle" font-size="11" fill="#4a4a4a">ws://host:5080/ws</text>

  <rect x="438" y="265" width="274" height="32" rx="6" fill="#ffffff" stroke="#2b5fa8"/>
  <text x="575" y="285" text-anchor="middle" font-size="11.5" fill="#1a1a2e">Registro de clientes (ClientSession)</text>

  <rect x="438" y="304" width="274" height="32" rx="6" fill="#ffffff" stroke="#2b5fa8"/>
  <text x="575" y="324" text-anchor="middle" font-size="11.5" fill="#1a1a2e">Tabla de suscripciones por tópico</text>

  <rect x="438" y="343" width="274" height="32" rx="6" fill="#ffffff" stroke="#2b5fa8"/>
  <text x="575" y="363" text-anchor="middle" font-size="11.5" fill="#1a1a2e">Distribuidor de mensajes (Publish → Deliver)</text>

  <rect x="438" y="382" width="274" height="32" rx="6" fill="#ffffff" stroke="#2b5fa8"/>
  <text x="575" y="402" text-anchor="middle" font-size="11.5" fill="#1a1a2e">Log de eventos en consola</text>

  <text x="575" y="440" text-anchor="middle" font-size="10" fill="#7a7a7a">No conoce "pedidos": solo ve register / subscribe / publish</text>
  <text x="575" y="454" text-anchor="middle" font-size="10" fill="#7a7a7a">sobre tópicos con nombre de texto</text>

  <!-- ===================== CAJA ===================== -->
  <rect x="30" y="260" width="200" height="90" rx="10" fill="#fbe4cd" stroke="#c76a1f" stroke-width="2"/>
  <text x="130" y="288" text-anchor="middle" font-size="13" font-weight="700" fill="#7a3d10">Caja</text>
  <text x="130" y="308" text-anchor="middle" font-size="10.5" fill="#8a5a2a">Panel web · rol: productor</text>
  <text x="130" y="325" text-anchor="middle" font-size="9.5" fill="#8a5a2a">register → publish</text>

  <!-- ===================== COCINA ===================== -->
  <rect x="900" y="85" width="220" height="120" rx="10" fill="#f5ecc7" stroke="#b8860b" stroke-width="2"/>
  <text x="1010" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#5c4406">Cocina</text>
  <text x="1010" y="133" text-anchor="middle" font-size="10.5" fill="#7a5c0c">Panel web · consumidor y productor</text>
  <text x="1010" y="150" text-anchor="middle" font-size="9.5" fill="#7a5c0c">subscribe("pedido.cocina")</text>
  <text x="1010" y="165" text-anchor="middle" font-size="9.5" fill="#7a5c0c">publish("pedido.delivery")</text>
  <text x="1010" y="181" text-anchor="middle" font-size="9" fill="#9c8552">al marcar "listo"</text>

  <!-- ===================== DELIVERY ===================== -->
  <rect x="900" y="370" width="220" height="120" rx="10" fill="#f3d8cf" stroke="#a0432b" stroke-width="2"/>
  <text x="1010" y="398" text-anchor="middle" font-size="13" font-weight="700" fill="#6b2415">Delivery</text>
  <text x="1010" y="418" text-anchor="middle" font-size="10.5" fill="#8a4f36">Panel web · consumidor y productor</text>
  <text x="1010" y="435" text-anchor="middle" font-size="9.5" fill="#8a4f36">subscribe("pedido.delivery")</text>
  <text x="1010" y="450" text-anchor="middle" font-size="9.5" fill="#8a4f36">publish("pedido.finalizado")</text>
  <text x="1010" y="466" text-anchor="middle" font-size="9" fill="#a5735c">al marcar "entregado"</text>

  <!-- ===================== FLECHAS ===================== -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <!-- Caja -> Broker (gap de 190px: línea horizontal, etiqueta sin cruces) -->
  <line x1="230" y1="305" x2="420" y2="305" stroke="#555555" stroke-width="1.6" marker-end="url(#arrow)"/>
  <rect x="248" y="284" width="160" height="18" fill="#ffffff"/>
  <text x="253" y="297" font-size="9.5" fill="#555">publish "pedido.cocina"</text>

  <!-- Broker <-> Cocina (gap de 170px entre cajas: caben las dos etiquetas sin tocarse) -->
  <line x1="730" y1="245" x2="900" y2="140" stroke="#555555" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="900" y1="185" x2="730" y2="305" stroke="#555555" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="735" y="222" width="150" height="34" rx="4" fill="#eef3fb" stroke="#2b5fa8" stroke-width="0.75"/>
  <text x="741" y="235" font-size="9.5" font-weight="600" fill="#1a3c6e">④ deliver</text>
  <text x="741" y="248" font-size="9" fill="#1a3c6e">"pedido.cocina"</text>

  <rect x="735" y="268" width="165" height="34" rx="4" fill="#f5ecc7" stroke="#b8860b" stroke-width="0.75"/>
  <text x="741" y="281" font-size="9.5" font-weight="600" fill="#5c4406">⑤ publish "pedido.delivery"</text>
  <text x="741" y="294" font-size="9" fill="#5c4406">al marcar "listo"</text>

  <!-- Broker <-> Delivery (mismo esquema, más abajo) -->
  <line x1="730" y1="365" x2="900" y2="405" stroke="#555555" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="900" y1="460" x2="730" y2="420" stroke="#555555" stroke-width="1.6" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <rect x="735" y="342" width="150" height="34" rx="4" fill="#eef3fb" stroke="#2b5fa8" stroke-width="0.75"/>
  <text x="741" y="355" font-size="9.5" font-weight="600" fill="#1a3c6e">⑥ deliver</text>
  <text x="741" y="368" font-size="9" fill="#1a3c6e">"pedido.delivery"</text>

  <rect x="735" y="418" width="163" height="34" rx="4" fill="#f3d8cf" stroke="#a0432b" stroke-width="0.75"/>
  <text x="741" y="431" font-size="9.5" font-weight="600" fill="#6b2415">⑦ publish "pedido.finalizado"</text>
  <text x="741" y="444" font-size="8.5" fill="#6b2415">al marcar "entregado" (sin suscriptor)</text>

  <!-- ===================== LEYENDA ===================== -->
  <rect x="35" y="520" width="1080" height="150" rx="10" fill="#fafafa" stroke="#cccccc"/>
  <text x="55" y="545" font-size="13" font-weight="700" fill="#1a1a2e">Cadena de tópicos (Caja → Cocina → Delivery)</text>

  <text x="55" y="571" font-size="11.5" font-weight="600" fill="#c76a1f">Caja</text>
  <text x="125" y="571" font-size="11.5" fill="#333">solo productor · publica en</text>
  <text x="340" y="571" font-size="11.5" font-weight="600" fill="#1a3c6e">pedido.cocina</text>

  <text x="55" y="595" font-size="11.5" font-weight="600" fill="#5c4406">Cocina</text>
  <text x="125" y="595" font-size="11.5" fill="#333">consume</text>
  <text x="240" y="595" font-size="11.5" font-weight="600" fill="#1a3c6e">pedido.cocina</text>
  <text x="365" y="595" font-size="11.5" fill="#333">→ produce</text>
  <text x="475" y="595" font-size="11.5" font-weight="600" fill="#1a3c6e">pedido.delivery</text>

  <text x="55" y="619" font-size="11.5" font-weight="600" fill="#6b2415">Delivery</text>
  <text x="125" y="619" font-size="11.5" fill="#333">consume</text>
  <text x="240" y="619" font-size="11.5" font-weight="600" fill="#1a3c6e">pedido.delivery</text>
  <text x="385" y="619" font-size="11.5" fill="#333">→ produce</text>
  <text x="495" y="619" font-size="11.5" font-weight="600" fill="#1a3c6e">pedido.finalizado</text>
  <text x="700" y="619" font-size="10.5" font-style="italic" fill="#888">(sin suscriptor en esta demo)</text>

  <text x="55" y="645" font-size="10.5" font-style="italic" fill="#555">El broker es agnóstico al dominio: la misma arquitectura sirve para "noticias"/"alertas" (fan-out) o para una</text>
  <text x="55" y="662" font-size="10.5" font-style="italic" fill="#555">cadena de pedidos como esta; solo cambian los nombres de tópico.</text>
</svg>
